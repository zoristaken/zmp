name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary_name: zmp
            archive_ext: tar.gz

          - platform: macos-latest
            target: x86_64-apple-darwin
            binary_name: zmp
            archive_ext: tar.gz

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_name: zmp
            archive_ext: tar.gz

          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: zmp
            archive_ext: tar.gz

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: zmp.exe
            archive_ext: zip

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libasound2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri bundles and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "zmp ${{ github.ref_name }}"
          releaseBody: "Installers and binaries for zmp ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Package raw binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/zmp" "dist/zmp"
          tar -czf "zmp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" -C dist zmp

      - name: Package raw binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/zmp.exe" "dist/zmp.exe"
          Compress-Archive -Path "dist/zmp.exe" -DestinationPath "zmp-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload raw binary archives
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            zmp-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}